<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahabharata Advanced Quiz</title>

<style>

/* 🔱 Background Image */
body {
    margin: 0;
    font-family: "Georgia", serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    /* Using your local image - use forward slashes for web compatibility */
    background-image: url("C:/Users/SIT.LAB8/Documents/web/Mahabharat_Characters.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

/* Dark overlay for readability */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: -1;
}

/* 🏹 Heading */
.header {
    position: absolute;
    top: 15px;
    padding: 18px 60px;
    background: #7b3f00;
    color: #fff8dc;
    font-size: 28px;
    font-weight: bold;
    border-radius: 10px;
    letter-spacing: 2px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    text-align: center;
}

/* 📜 Quiz Box */
.quiz-box {
    background: #fffaf0;
    width: 92%;
    max-width: 750px;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    text-align: center;
    border: 3px solid #7b3f00;
}

#question {
    color: #5c3d2e;
    margin-bottom: 20px;
}

/* ⚔ Options */
.option-btn {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #7b3f00;
    background: #f9f1dc;
    color: #000;
    cursor: pointer;
    transition: 0.3s;
    font-weight: bold;
}

.option-btn:hover {
    background: #d4a373;
}

.selected {
    background: #d4a373 !important;
}

/* Result Styles */
.correct {
    background: #2ecc71 !important;
    color: white !important;
}

.incorrect {
    background: #e74c3c !important;
    color: white !important;
}

button {
    padding: 10px 20px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #7b3f00;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: #5c2f00;
}

#result {
    margin-top: 10px;
    font-weight: bold;
    color: white;
}

@media(max-width:600px){
    .quiz-box { padding: 25px; }
    .header { font-size: 20px; padding: 15px 30px; }
}

</style>
</head>

<body>

<div class="header">
    🏹 Mahabharata – Advanced Wisdom Challenge 🔱
</div>

<div class="quiz-box">
    <h3 id="question"></h3>
    <div id="options"></div>
    <div id="result"></div>
    <button id="submitBtn">Submit Answer ⚔</button>
    <button id="nextBtn" style="display:none;">Next Question ➡</button>
</div>

<script>

const quizData = [
{question:"1️⃣ Who was the father of King Shantanu?", options:["Pratipa","Vichitravirya","Bharata","Nahusha"], correct:0},
{question:"2️⃣ Who killed Shishupala?", options:["Arjuna","Bhima","Krishna","Sahadeva"], correct:2},
{question:"3️⃣ What was the name of Arjuna’s bow?", options:["Vijaya","Sharanga","Gandiva","Pinaka"], correct:2},
{question:"4️⃣ Who cursed Karna that he would forget his knowledge?", options:["Dronacharya","Parashurama","Kripacharya","Bhishma"], correct:1},
{question:"5️⃣ Who was the son of Arjuna and Subhadra?", options:["Abhimanyu","Ghatotkacha","Iravan","Babruvahana"], correct:0},
{question:"6️⃣ Who killed Abhimanyu?", options:["Karna","Drona","Jayadratha","Duryodhana"], correct:2},
{question:"7️⃣ Who was the wife of Dronacharya?", options:["Kunti","Kripi","Madri","Gandhari"], correct:1},
{question:"8️⃣ What was Bhishma’s original name?", options:["Devavrata","Shantanu","Vasu","Chitrangada"], correct:0},
{question:"9️⃣ Who killed Dronacharya?", options:["Arjuna","Bhima","Dhrishtadyumna","Sahadeva"], correct:2},
{question:"🔟 Who broke Duryodhana’s thigh?", options:["Arjuna","Bhima","Krishna","Sahadeva"], correct:1},
{question:"1️⃣1️⃣ Who was Ghatotkacha’s father?", options:["Arjuna","Bhima","Karna","Yudhishthira"], correct:1},
{question:"1️⃣2️⃣ Who was the eldest Kaurava?", options:["Dushasana","Duryodhana","Vikarna","Yuyutsu"], correct:1},
{question:"1️⃣3️⃣ Who was the teacher of Karna?", options:["Drona","Kripa","Parashurama","Bhishma"], correct:2},
{question:"1️⃣4️⃣ Who killed Karna?", options:["Bhima","Arjuna","Krishna","Nakula"], correct:1},
{question:"1️⃣5️⃣ Who was the mother of the Pandavas?", options:["Gandhari","Kunti","Madri","Both Kunti & Madri"], correct:3},
{question:"1️⃣6️⃣ What was the conch of Krishna called?", options:["Panchajanya","Devadatta","Ananta","Sughosha"], correct:0},
{question:"1️⃣7️⃣ Who killed Bhishma?", options:["Arjuna","Shikhandi","Krishna","Bhima"], correct:0},
{question:"1️⃣8️⃣ Who was the son of Duryodhana?", options:["Lakshmana","Ashwatthama","Vikarna","Jayadratha"], correct:0},
{question:"1️⃣9️⃣ Who narrated Mahabharata to King Janamejaya?", options:["Vyasa","Sanjaya","Vaishampayana","Narada"], correct:2},
{question:"2️⃣0️⃣ Who was the wife of Yudhishthira?", options:["Draupadi","Subhadra","Ulupi","Chitrangada"], correct:0},
{question:"2️⃣1️⃣ Who killed Ghatotkacha?", options:["Karna","Arjuna","Drona","Ashwatthama"], correct:0},
{question:"2️⃣2️⃣ Who was Vidura considered to be an incarnation of?", options:["Yama","Indra","Agni","Vayu"], correct:0},
{question:"2️⃣3️⃣ Who blinded himself with Gandhari?", options:["Dhritarashtra","Duryodhana","Shakuni","Bhishma"], correct:0},
{question:"2️⃣4️⃣ Who was Shakuni’s sister?", options:["Madri","Kunti","Gandhari","Draupadi"], correct:2},
{question:"2️⃣5️⃣ Who survived the Kurukshetra war among Kauravas?", options:["Duryodhana","Ashwatthama","Karna","Dushasana"], correct:1}
];

let currentQuestion = 0;
let score = 0;
let selectedOption = null;

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const resultEl = document.getElementById("result");
const submitBtn = document.getElementById("submitBtn");
const nextBtn = document.getElementById("nextBtn");

function loadQuestion() {
    selectedOption = null;
    resultEl.innerHTML = "";
    submitBtn.style.display = "inline-block";
    nextBtn.style.display = "none";

    const q = quizData[currentQuestion];
    questionEl.textContent = q.question;

    optionsEl.innerHTML = "";
    q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.textContent = option;
        btn.classList.add("option-btn");
        btn.onclick = () => selectOption(btn, index);
        optionsEl.appendChild(btn);
    });
}

function selectOption(button, index) {
    const buttons = document.querySelectorAll(".option-btn");
    buttons.forEach(btn => btn.classList.remove("selected"));
    button.classList.add("selected");
    selectedOption = index;
}

submitBtn.onclick = function() {
    if (selectedOption === null) {
        alert("⚠ Please select an option!");
        return;
    }

    const correctIndex = quizData[currentQuestion].correct;
    const buttons = document.querySelectorAll(".option-btn");

    buttons.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === correctIndex) btn.classList.add("correct");
        if (idx === selectedOption && idx !== correctIndex) btn.classList.add("incorrect");
    });

    if (selectedOption === correctIndex) {
        resultEl.innerHTML = "✅ Correct! You wield great wisdom!";
        score++;
    } else {
        resultEl.innerHTML = "❌ Incorrect! Correct Answer: " + quizData[currentQuestion].options[correctIndex];
    }

    submitBtn.style.display = "none";
    nextBtn.style.display = "inline-block";
}

nextBtn.onclick = function() {
    currentQuestion++;
    if (currentQuestion < quizData.length) {
        loadQuestion();
    } else {
        showScore();
    }
}

function showScore() {
    let message = "";
    if (score >= 22) message = "🌟 Supreme Scholar of Mahabharata!";
    else if (score >= 18) message = "🔱 True Warrior of Knowledge!";
    else if (score >= 12) message = "📜 Good Knowledge of the Epic!";
    else message = "⚔ Continue your quest for wisdom!";

    document.querySelector(".quiz-box").innerHTML = `
        <h2>🏆 Final Score: ${score} / 25</h2>
        <p>${message}</p>
        <button onclick="location.reload()">Restart 🔄</button>
    `;
}

loadQuestion();

</script>

</body>
</html>
